name: Publish to TestPyPI

# Manual dry-run of the release flow against TestPyPI (test.pypi.org).
# Trigger: Actions tab → "Publish to TestPyPI" → Run workflow.
# One-time setup: on test.pypi.org add a trusted publisher for project `aixon` →
# owner `JorgeHSantana`, repo `aixon`, workflow `publish-testpypi.yml`,
# environment `testpypi`.
# Note: TestPyPI rejects re-uploading an existing version — bump (e.g.
# 0.1.0.dev1) to re-test the same release.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[all,dev]"
      - run: pytest -q

  publish-testpypi:
    needs: test
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write    # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
