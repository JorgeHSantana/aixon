name: Test & Publish

# Fully automated pipeline (mirrors restmcp): every push to main runs the suite
# with coverage, uploads to Codecov, then publishes to TestPyPI and PyPI via
# Trusted Publishing (OIDC — no API token), and tags a GitHub Release.
# One-time setup:
#   - PyPI:     trusted publisher → project `aixon`, owner `JorgeHSantana`,
#               repo `aixon`, workflow `publish.yml`, environment `pypi`.
#   - TestPyPI: trusted publisher → same, workflow `publish.yml`, env `testpypi`.
#   - Repo secret CODECOV_TOKEN (Settings → Secrets → Actions).

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[all,dev]"
      - run: mypy aixon
      - run: pytest --cov=aixon --cov-report=xml
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml

  bare-install-smoke:
    # Validates the neutral-boundary/lazy-import discipline: `import aixon`
    # and the `aixon` console-script must both work with NO extras installed
    # (the langchain/langgraph/click core deps only) — the exact opposite of
    # the `test` job's `[all,dev]` install above. Identical to test.yml's job
    # of the same name (that one gates PRs; this one gates the push-to-main
    # publish pipeline, so a regression can't slip through on a direct push).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install .
      - run: python -c "import aixon; print(aixon.__version__)"
      - run: aixon --help

  publish-testpypi:
    needs: [test, bare-install-smoke]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write    # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write    # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true    # no-op when the version already exists — keeps pushes green

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Read version
        id: ver
        run: echo "version=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"(.*)".*/\1/')" >> "$GITHUB_OUTPUT"
      - name: Tag and publish a GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.ver.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — skipping."
          else
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              --target "$GITHUB_SHA"
          fi
