name: Publish to PyPI

# Publishes on a GitHub Release. Tests must pass first, then the package is built
# and uploaded via PyPI Trusted Publishing (OIDC) — no API token secret.
# One-time setup: on PyPI add a trusted publisher for project `aixon` →
# owner `JorgeHSantana`, repo `aixon`, workflow `publish.yml`, environment `pypi`.
on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[all,dev]"
      - run: pytest -q

  publish:
    needs: test          # do not publish if tests fail
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write    # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
