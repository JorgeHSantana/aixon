name: Publish to PyPI

# Publishes on a GitHub Release. Uses PyPI Trusted Publishing (OIDC) — no API
# token secret to manage. One-time setup: on PyPI, add a trusted publisher for
# project `aixon` → owner `JorgeHSantana`, repo `aixon`, workflow `publish.yml`,
# environment `pypi`.
on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
